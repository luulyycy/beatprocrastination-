<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 戰勝拖延大作戰系統 2.0</title>
    <style>
        /* ==========================================
           1. 全域樣式、變數設定與一體化輕暖色美學
           ========================================== */
        :root {
            /* 輕盈溫暖系調色盤 */
            --primary-color: #e06d3b; /* 溫慢陶土橙 */
            --primary-light: #fdf5f0; /* 柔和燕麥白 */
            --primary-hover: #c45627; /* 濃郁焦糖橘 */
            --primary-gradient: linear-gradient(135deg, #f39c12 0%, #e06d3b 100%); /* 太陽光芒漸層 */
            
            --secondary-color: #fbf9f6; /* 主背景：暖乳白 (Warm Ivory) */
            --sidebar-bg: #f2ede6;      /* 側邊欄：僅比背景稍深的柔和麥芽棕，達成一體化視覺 */
            --sidebar-text: #6e5e5d;    /* 側邊欄文字：深栗褐，與系統文字保持和諧 */
            --sidebar-active-bg: rgba(74, 62, 61, 0.06); /* 懸停時的柔和微陰影 */
            
            --accent-color: #d94343; /* 暖陽紅 */
            --text-color: #4a3e3d; /* 深栗褐 */
            --text-light: #9e8e8c;
            --border-color: #ebdcb9; /* 溫柔的麥芽黃邊框 */
            --border-focus: #e06d3b;
            --card-bg: #ffffff;
            --sidebar-width: 280px;
            
            /* 平滑陰影與圓角標準 */
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 4px 12px rgba(74, 62, 61, 0.02);
            --shadow-md: 0 10px 30px rgba(74, 62, 61, 0.04);
            --shadow-lg: 0 20px 48px rgba(74, 62, 61, 0.06);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================
           2. 側邊導覽列 (Sidebar Navigation)
           ========================================== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(235, 220, 185, 0.6); /* 細緻的溫暖分隔線 */
            display: flex;
            flex-direction: column;
            padding: 32px 20px;
            box-sizing: border-box;
            height: 100%;
            z-index: 10;
            transition: var(--transition);
        }

        .sidebar-header {
            margin-bottom: 36px;
            padding: 0 12px;
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header p {
            margin: 6px 0 0 0;
            font-size: 0.8rem;
            color: var(--text-light);
            opacity: 0.9;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-btn {
            background-color: transparent;
            border: none;
            padding: 14px 18px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--sidebar-text);
            text-align: left;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover {
            background-color: var(--sidebar-active-bg);
            color: var(--text-color);
            transform: translateX(4px);
        }

        .nav-btn.active {
            background-color: var(--primary-color);
            background-image: var(--primary-gradient);
            color: #ffffff;
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(224, 109, 59, 0.25);
        }

        .nav-btn.active:hover {
            transform: none;
            color: #ffffff;
        }

        .nav-divider {
            height: 1px;
            background-color: rgba(74, 62, 61, 0.08);
            margin: 16px 12px;
            border: none;
        }

        /* ==========================================
           3. 右側主展示面板 (Main Content Area)
           ========================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            background-color: var(--secondary-color);
            position: relative;
        }

        .main-header {
            background-color: var(--card-bg);
            padding: 0 48px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            height: 80px;
            box-sizing: border-box;
        }

        .main-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: -0.3px;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 40px 48px;
            box-sizing: border-box;
        }

        /* 📊 統計摘要面板 */
        .stats-summary-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 18px 24px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: transparent;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: #ebdcb9;
        }

        .stat-card.highlight::before {
            background: var(--primary-color);
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-color);
            line-height: 1.2;
        }

        .stat-card.highlight .stat-value {
            color: var(--primary-color);
        }

        /* 🔍 即時關鍵字搜尋列 */
        .search-container {
            max-width: 1100px;
            margin: 0 auto 32px auto;
            display: none;
        }

        .search-input-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input-wrapper input[type="text"] {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: 1rem;
            background-color: var(--card-bg);
            color: var(--text-color);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .search-input-wrapper input[type="text"]:focus {
            outline: none;
            border-color: var(--border-focus);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(224, 109, 59, 0.12);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.1rem;
            pointer-events: none;
            opacity: 0.7;
        }

        /* 視圖切換機制 */
        .view-section {
            display: none;
            max-width: 1100px;
            margin: 0 auto;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================
           4. 高質感輸入表單美學 (Form Aesthetic)
           ========================================== */
        .form-container {
            background: var(--card-bg);
            padding: 40px 48px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            max-width: 680px;
            margin: 0 auto;
        }

        .form-group { margin-bottom: 28px; }
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-color);
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fdfcf9;
            color: var(--text-color);
            transition: var(--transition);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--border-focus);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(224, 109, 59, 0.12);
        }

        .label-hint { font-size: 0.8rem; color: var(--text-light); font-weight: normal; margin-left: 4px; }

        #subTasksContainer { display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; }
        #subTasksContainer input { background-color: #fdfcf9; }
        
        .btn-secondary {
            background: #fff; border: 1px dashed #dcd3be; color: #7a6e67;
            padding: 14px; border-radius: var(--radius-md); cursor: pointer; width: 100%;
            font-weight: 600; font-size: 0.95rem; transition: var(--transition);
        }
        .btn-secondary:hover {
            border-color: var(--primary-color); color: var(--primary-color); background-color: var(--primary-light);
        }

        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; font-weight: 600; }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary-color); cursor: pointer; border-radius: 4px; }

        .btn-primary {
            background-color: var(--primary-color); background-image: var(--primary-gradient); color: white; border: none;
            padding: 16px; border-radius: var(--radius-md); cursor: pointer; font-weight: 700;
            width: 100%; font-size: 1.05rem; transition: var(--transition);
            box-shadow: 0 4px 14px rgba(224, 109, 59, 0.3); margin-top: 12px;
        }
        .btn-primary:hover {
            background-image: none; background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(224, 109, 59, 0.4);
        }
        .btn-primary:active { transform: translateY(0); }

        /* ==========================================
           5. 網格雙欄排版與任務卡片 (Grid & Cards)
           ========================================== */
        #main-list-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 28px; 
            width: 100%;
        }

        .empty-state {
            grid-column: span 2;
            text-align: center;
            padding: 96px 32px;
            color: var(--text-light);
            font-size: 1.05rem;
            background: #fff;
            border-radius: var(--radius-lg);
            border: 2px dashed #ebdcb9;
            box-shadow: var(--shadow-sm);
        }

        .task-card {
            background: #fff; border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 28px; box-sizing: border-box; transition: var(--transition);
            display: flex; flex-direction: column; justify-content: space-between;
            width: 100% !important; margin: 0 !important;
            box-shadow: var(--shadow-sm);
        }
        .task-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: #ebdcb9; }

        .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 12px; }
        .task-title { font-size: 1.25rem; font-weight: 800; margin: 0; color: var(--text-color); word-break: break-all; letter-spacing: -0.2px; line-height: 1.4; }
        
        .task-author {
            font-size: 0.8rem; color: #b2572b; background-color: #fdf5f0; border: 1px solid #f5decb;
            padding: 4px 12px; border-radius: var(--radius-sm); display: inline-flex; align-items: center; gap: 6px;
            margin-bottom: 16px; font-weight: 700; width: fit-content;
        }

        .public-badge { display: none; background: #fdf6ec; color: #e6a23c; border: 1px solid #f5dab1; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 700; }
        
        .task-meta { font-size: 0.88rem; color: #5a4b4a; margin-bottom: 20px; background: #fdfcf9; padding: 12px 16px; border-radius: var(--radius-md); display: flex; justify-content: space-between; border: 1px solid var(--border-color); }
        .badge-dread { font-weight: 700; color: var(--accent-color); }

        /* 進度條自訂美化 */
        .progress-container { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .task-progress { flex: 1; height: 8px; border-radius: 4px; background-color: #f5f0e1; border: none; overflow: hidden; }
        .task-progress::-webkit-progress-bar { background-color: #f5f0e1; border-radius: 4px; }
        .task-progress::-webkit-progress-value { background: var(--primary-gradient); border-radius: 4px; transition: width 0.3s ease; }
        .progress-text { font-size: 0.85rem; font-weight: 700; color: #7a6e67; font-variant-numeric: tabular-nums; }
        
        /* 子任務細緻化 */
        .sub-tasks-list { list-style: none; padding: 0; margin: 0 0 20px 0; background: #fdfcf9; border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .sub-tasks-list li { display: flex; align-items: flex-start; gap: 12px; font-size: 0.95rem; color: var(--text-color); font-weight: 500; line-height: 1.4; }
        .sub-tasks-list input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary-color); cursor: pointer; flex-shrink: 0; margin-top: 2px; }
        .sub-tasks-list label { cursor: pointer; width: 100%; transition: var(--transition); }
        .strike { text-decoration: line-through; color: var(--text-light); opacity: 0.6; }

        /* 卡片底部操作區 */
        .main-action { border-top: 1px solid var(--border-color); padding-top: 20px; margin-top: auto; }
        .main-action.locked { opacity: 0.7; background: #fdfcf9; border-radius: var(--radius-md); padding: 14px; border: 1px dashed var(--border-color); }
        .unlock-msg { font-size: 0.8rem; color: #c45627; display: block; margin-top: 8px; font-weight: 600; text-align: center; }

        .state-reflecting-view { background: #fffdf3; padding: 20px; border-radius: var(--radius-md); border: 1px solid #f3e5be; margin-top: 12px; box-shadow: inset 0 1px 4px rgba(0,0,0,0.01); }
        .state-reflecting-view label { font-size: 0.9rem; font-weight: 700; display: block; margin-bottom: 8px; color: #b28f1e; }
        .state-reflecting-view input, .state-reflecting-view select {
            width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); box-sizing: border-box; margin-bottom: 14px; font-size: 0.95rem; background: #fff;
        }
        .state-reflecting-view input:focus, .state-reflecting-view select:focus { outline: none; border-color: #f39c12; box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.15); }

        .state-done-view { background: #f9fbf4; border: 1px solid #cfe0b8; padding: 20px; border-radius: var(--radius-md); margin-top: 12px; font-size: 0.95rem; color: #4e7323; }
        .state-done-view strong { color: #2e4d0d; font-size: 1.05rem; }
        .congrats-message { font-weight: 800; color: #3d6611; margin-top: 10px; font-size: 1.1rem; line-height: 1.4; }

        /* 社群加油區 */
        .community-cheer-section { display: none; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 18px; border-top: 1px dashed var(--border-color); }
        .btn-cheer { background: #fff3f3; border: 1px solid #ffccd1; color: #d94343; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 0.88rem; font-weight: 700; transition: var(--transition); box-shadow: 0 2px 6px rgba(217, 67, 67, 0.08); }
        .btn-cheer:hover { background: #d94343; color: white; border-color: #d94343; transform: scale(1.05); box-shadow: 0 4px 12px rgba(217, 67, 67, 0.25); }
        .btn-cheer:active { transform: scale(1); }
        .cheers-count { font-size: 0.88rem; color: #6e5e5d; font-weight: 500; }
        .cheers-count-value { font-weight: 800; color: #d94343; font-size: 1.1rem; font-variant-numeric: tabular-nums; }

        /* 高級 Toast 提示機制 */
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; }
        .toast { background: #3a2e2b; color: #fff; padding: 14px 24px; border-radius: var(--radius-md); margin-bottom: 12px; box-shadow: var(--shadow-lg); font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(255,255,255,0.05); animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); transition: var(--transition); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* ==========================================
           6. 全螢幕極致 RWD 手機版型配適 (Responsive)
           ========================================== */
        @media (max-width: 1024px) {
            #main-list-container { grid-template-columns: 1fr; }
            .empty-state { grid-column: span 1; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            
            /* 側邊欄改造成頂部精緻導覽列 */
            .sidebar { width: 100%; height: auto; border-right: none; padding: 16px; border-bottom: 1px solid var(--border-color); background: var(--sidebar-bg); }
            .sidebar-header { margin-bottom: 14px; text-align: center; }
            .sidebar-header h2 { justify-content: center; font-size: 1.2rem; }
            .sidebar-header p { display: none; }
            
            /* 導覽按鈕改為橫向滾動式，防擠壓 */
            .sidebar-nav { flex-direction: row; overflow-x: auto; white-space: nowrap; gap: 8px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
            .sidebar-nav::-webkit-scrollbar { display: none; }
            .nav-btn { padding: 10px 16px; font-size: 0.88rem; flex-shrink: 0; }
            .nav-btn:hover { transform: none; }
            .nav-divider { display: none; }

            .main-content { height: auto; }
            .main-header { padding: 0 20px; height: 60px; justify-content: center; border-bottom: none; background: transparent; margin-top: 10px; }
            .main-header h1 { font-size: 1.25rem; }
            
            .content-scroll { padding: 16px 20px 40px 20px; }
            
            /* 統計看板調整為雙欄緊湊排列 */
            .stats-summary-bar { grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
            .stat-card { padding: 12px 16px; }
            .stat-card .stat-value { font-size: 1.4rem; }
            
            .search-container { margin-bottom: 20px; }
            
            /* 表單全面自適應擴展 */
            .form-container { padding: 24px 20px; border-radius: var(--radius-md); }
            .form-group input[type="text"], .form-group input[type="number"], .form-group select { padding: 12px; font-size: 0.95rem; }
            
            /* 卡片排版優化 */
            .task-card { padding: 20px; border-radius: var(--radius-md); }
            .task-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>⚔️ 戰勝拖延大作戰</h2>
            <p>消滅藉口，贏過昨天的自己</p>
        </div>
        
        <nav class="sidebar-nav" id="nav-buttons">
            <button class="nav-btn active" data-view="view-create">➕ 建立新任務</button>
            <hr class="nav-divider">
            <button class="nav-btn" data-view="view-list" data-filter="active">🌱 進行中</button>
            <button class="nav-btn" data-view="view-list" data-filter="reflecting">📝 等待反思</button>
            <button class="nav-btn" data-view="view-list" data-filter="done">✨ 歷史成就</button>
            <hr class="nav-divider">
            <button class="nav-btn" data-view="view-list" data-filter="community">🫂 社群微光</button>
            <button class="nav-btn" data-view="view-list" data-filter="all">📋 全部紀錄</button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <h1 id="view-title">➕ 建立新任務</h1>
        </header>

        <div class="content-scroll">
            
            <div class="stats-summary-bar" id="statsSummaryBar">
                <div class="stat-card">
                    <span class="stat-label">🎯 累計挑戰</span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-card highlight">
                    <span class="stat-label">🌱 專注奮戰中</span>
                    <span class="stat-value" id="stat-active">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">📝 待補完反思</span>
                    <span class="stat-value" id="stat-reflecting">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">👑 克服的軌跡</span>
                    <span class="stat-value" id="stat-done">0</span>
                </div>
            </div>

            <div class="search-container" id="searchBarContainer">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="taskSearchInput" placeholder="輸入任務關鍵字或夥伴暱稱搜尋...">
                </div>
            </div>
            
            <div id="view-create" class="view-section active">
                <div class="form-container">
                    <form id="taskForm">
                        <div class="form-group">
                            <label for="userName">您的暱稱 <span class="label-hint">(選填，留空將顯示為匿名)</span> 👤</label>
                            <input type="text" id="userName" name="userName" placeholder="例如：想喝珍奶的樹懶">
                        </div>

                        <div class="form-group">
                            <label for="taskName">你想跨出的第一步 🎯</label>
                            <input type="text" id="taskName" name="taskName" placeholder="例如：寫出第一個章節的大綱" required>
                        </div>

                        <div class="form-group">
                            <label for="estimatedTime">預估耗時 <span class="label-hint">(分鐘)</span> ⏱️</label>
                            <input type="number" id="estimatedTime" name="estimatedTime" min="1" placeholder="建議設定在 15-30 分鐘內" required>
                        </div>

                        <div class="form-group">
                            <label for="dreadLevel">當下對這件事的抗拒指數 🦖</label>
                            <select id="dreadLevel" name="dreadLevel">
                                <option value="低 😊">低 😊（頭洗了就能順利做完）</option>
                                <option value="中 😐" selected>中 😐（需要稍微給自己做點心理建設）</option>
                                <option value="高 🌋">高 🌋（光是想到生理上就開始抗拒）</option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-top: 30px;">
                            <label>拆解成毫無負擔的「墊腳石子任務」🐾</label>
                            <div id="subTasksContainer">
                                <input type="text" name="subTask" placeholder="子任務 1 (例如：打開電腦並登入)" required>
                                <input type="text" name="subTask" placeholder="子任務 2 (例如：下載今年的表格)">
                            </div>
                            <button type="button" id="addSubTaskBtn" class="btn-secondary">＋ 增加一步更簡單的微任務</button>
                        </div>

                        <div class="form-group">
                            <label class="checkbox-group">
                                <input type="checkbox" id="isPublic" name="isPublic" checked>
                                <span>願意公開此挑戰，接受社群溫柔打氣 🫂</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-primary">✨ 啟動我的墊腳石任務</button>
                    </form>
                </div>
            </div>

            <div id="view-list" class="view-section">
                <div id="main-list-container">
                    </div>
            </div>

        </div>
    </main>

    <template id="task-card-template">
        <div class="task-card">
            <div>
                <div class="task-header">
                    <h3 class="task-title"></h3>
                    <span class="public-badge">🌐 公開</span>
                </div>
                
                <div class="task-author font-author">👤 夥伴：<span class="author-name"></span></div>
                
                <div class="task-meta">
                    <span>⏱️ 預估：<strong class="value-est-time">0</strong> 分鐘</span>
                    <span>🦖 抗拒度：<span class="badge-dread value-dread">中</span></span>
                </div>

                <div class="progress-container">
                    <progress class="task-progress" value="0" max="100"></progress>
                    <span class="progress-text">0%</span>
                </div>
                <ul class="sub-tasks-list"></ul>
            </div>

            <div class="main-action">
                <div class="state-active-view">
                    <label class="checkbox-group">
                        <input type="checkbox" class="main-task-checkbox">
                        <strong>我已完成這項主挑戰！🏆</strong>
                    </label>
                    <span class="unlock-msg">🔒 請先勾選克服上方所有的「墊腳石子任務」唷！</span>
                </div>

                <div class="state-reflecting-view">
                    <label>📝 恭喜跨出！簡單做個溫柔的反思吧：</label>
                    <label style="margin-top:10px;">實際花費了多少時間？(分鐘)</label>
                    <input type="number" class="input-actual-time" min="1" placeholder="例如：20">
                    
                    <label>做完之後當下的心情如何？</label>
                    <select class="input-post-mood">
                        <option value="輕鬆多了">輕鬆多了 💆（原來真的沒想像中那麼難）</option>
                        <option value="充滿能量">充滿能量 ⚡（大腦啟動了，想繼續前進）</option>
                        <option value="精疲力盡">精疲力盡 😴（雖然累，但我走出了舒適圈）</option>
                        <option value="覺得驕傲">覺得驕傲 👑（我對抗了焦慮，我是勇者）</option>
                    </select>
                    <button type="button" class="btn-primary btn-submit-reflection" style="padding: 12px; font-size:1rem; margin-top:5px;">保存紀錄，解鎖成就！</button>
                </div>

                <div class="state-done-view">
                    <div>⏱️ 實際耗時：<strong class="res-actual-time">0</strong> 分鐘</div>
                    <div>心情狀態：<strong class="res-post-mood">-</strong></div>
                    <div class="congrats-message"></div>
                </div>

                <div class="community-cheer-section">
                    <span class="cheers-count">🕯️ <span class="cheers-count-value">0</span> 盞守護微光</span>
                    <button type="button" class="btn-cheer">遞出溫慢 🧡</button>
                </div>
            </div>
        </div>
    </template>

    <div id="toast-container"></div>

    <script>
        const STORAGE_KEY = 'records';
        let currentView = 'view-create';
        let currentFilter = 'active';
        
        // Google Apps Script 網址
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZP30sW4tJMDR40VuJeoXT6gzHtqyYQZzaB91ajWZZzzF4W-fx7uWZ8HDBvluDsAP3/exec"; 

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.innerHTML = `<span>🧡</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0'; toast.style.transform = 'translateY(-10px)';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        async function syncToSheet(payload) {
            try { await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) }); } 
            catch (err) { console.error("雲端同步失敗:", err); }
        }

        async function fetchRecordsFromSheet() {
            const response = await fetch(APPS_SCRIPT_URL);
            const result = await response.json();
            if (!result.ok) throw new Error(result.error);
            return result.records.map(normalizeRecord);
        }

        function normalizeRecord(record) {
            const normalized = {};
            const mapping = {
                id: ["id"], createdAt: ["createdAt"], status: ["status"], isReflecting: ["isReflecting"],
                taskName: ["taskName"], estimatedTime: ["estimatedTime"], dreadLevel: ["dreadLevel"],
                subTasks: ["subTasks"], reflection: ["reflection"], isPublic: ["isPublic"],
                cheersCount: ["cheersCount"], userName: ["userName"]
            };

            Object.keys(mapping).forEach(frontendKey => {
                const foundKey = Object.keys(record).find(k => mapping[frontendKey].some(p => p.toLowerCase() === k.toLowerCase()));
                let value = foundKey ? record[foundKey] : undefined;
                if (frontendKey === "subTasks") { try { value = typeof value === "string" ? JSON.parse(value) : value; } catch(e) { value = []; } if(!Array.isArray(value)) value = []; }
                if (frontendKey === "reflection") { try { value = typeof value === "string" ? JSON.parse(value) : value; } catch(e) { value = { actualTime: '', postMood: '' }; } if(!value) value = { actualTime: '', postMood: '' }; }
                if (frontendKey === "estimatedTime" || frontendKey === "cheersCount") value = Number(value) || 0;
                if (frontendKey === "isReflecting") value = String(value).toLowerCase() === "true" || value === true;
                if (frontendKey === "isPublic") value = value === undefined || value === "" ? true : (String(value).toLowerCase() === "true" || value === true);
                if (frontendKey === "userName") value = value ? String(value).trim() : "匿名同伴";
                if (frontendKey === "status" && value) value = String(value).toLowerCase();
                
                normalized[frontendKey] = value;
            });
            return normalized;
        }

        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        function updateRecord(id, changes) {
            let records = loadData();
            records = records.map(r => r.id === id ? { ...r, ...changes } : r);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            syncToSheet({ action: "update", id, changes });
            applyFilterAndRender();
        }

        async function applyFilterAndRender() {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(currentView).classList.add('active');

            const titleEl = document.getElementById('view-title');

            let allRecords = [];
            try { allRecords = await fetchRecordsFromSheet(); localStorage.setItem(STORAGE_KEY, JSON.stringify(allRecords)); } 
            catch (err) { allRecords = loadData(); }

            const countTotal = allRecords.length;
            const countActive = allRecords.filter(r => r.status === 'active' && !r.isReflecting).length;
            const countReflecting = allRecords.filter(r => r.status === 'active' && r.isReflecting).length;
            const countDone = allRecords.filter(r => r.status === 'done').length;

            document.getElementById('stat-total').textContent = countTotal;
            document.getElementById('stat-active').textContent = countActive;
            document.getElementById('stat-reflecting').textContent = countReflecting;
            document.getElementById('stat-done').textContent = countDone;

            const searchBarContainer = document.getElementById('searchBarContainer');
            if (currentView === 'view-create') {
                titleEl.textContent = '➕ 建立新任務';
                searchBarContainer.style.display = 'none';
                return;
            } else {
                searchBarContainer.style.display = 'block';
            }

            let recordsToShow = [];

            if (currentFilter === 'active') {
                recordsToShow = allRecords.filter(r => r.status === 'active' && !r.isReflecting);
                titleEl.textContent = '🌱 進行中的挑戰';
            } else if (currentFilter === 'reflecting') {
                recordsToShow = allRecords.filter(r => r.status === 'active' && r.isReflecting);
                titleEl.textContent = '📝 等待反思 (即將完成)';
            } else if (currentFilter === 'done') {
                recordsToShow = allRecords.filter(r => r.status === 'done');
                titleEl.textContent = '✨ 歷史成就紀錄';
            } else if (currentFilter === 'community') {
                recordsToShow = allRecords.filter(r => r.isPublic === true && r.status === 'active');
                titleEl.textContent = '🫂 社群微光打氣區';
            } else {
                recordsToShow = allRecords;
                titleEl.textContent = '📋 全部挑戰歷史';
            }

            recordsToShow.sort((a, b) => {
                const getWeight = (level) => {
                    if (String(level).includes('高') || String(level).includes('🌋')) return 3;
                    if (String(level).includes('中') || String(level).includes('😐')) return 2;
                    return 1;
                };
                return getWeight(b.dreadLevel) - getWeight(a.dreadLevel);
            });

            const searchQuery = document.getElementById('taskSearchInput').value.trim().toLowerCase();
            if (searchQuery !== '') {
                recordsToShow = recordsToShow.filter(r => 
                    r.taskName.toLowerCase().includes(searchQuery) || 
                    r.userName.toLowerCase().includes(searchQuery)
                );
            }

            const listContainer = document.getElementById('main-list-container');
            listContainer.innerHTML = ''; 

            if (recordsToShow.length === 0) {
                let emptyMsg = '📋 目前沒有對應的任務紀錄。';
                if (searchQuery !== '') {
                    emptyMsg = `🔍 沒有找到包含「${searchQuery}」的任務，換個字試試看？`;
                } else if (currentFilter === 'active') {
                    emptyMsg = '🛋️ 目前沒有進行中的任務。好好休息，準備好了再來！';
                } else if (currentFilter === 'reflecting') {
                    emptyMsg = '🎉 太棒了，目前沒有積欠的反思紀錄！';
                } else if (currentFilter === 'done') {
                    emptyMsg = '🌱 你的專屬歷史成就牆，跨出第一步後就會在這裡點亮。';
                } else if (currentFilter === 'community') {
                    emptyMsg = '🫂 大家目前都在休息，要由你來跨出溫慢的第一步嗎？';
                }
                listContainer.innerHTML = `<div class="empty-state">${emptyMsg}</div>`;
                return;
            }

            recordsToShow.forEach(record => { listContainer.appendChild(createCardDOM(record)); });
        }

        function createCardDOM(record) {
            const template = document.getElementById('task-card-template');
            const card = template.content.cloneNode(true).querySelector('.task-card');
            
            card.querySelector('.task-title').textContent = record.taskName;
            card.querySelector('.value-est-time').textContent = record.estimatedTime;
            card.querySelector('.value-dread').textContent = record.dreadLevel;
            card.querySelector('.author-name').textContent = record.userName;

            if (record.isPublic && currentFilter !== 'community') card.querySelector('.public-badge').style.display = 'inline-flex';

            const viewActive = card.querySelector('.state-active-view');
            const viewReflecting = card.querySelector('.state-reflecting-view');
            const viewDone = card.querySelector('.state-done-view');

            if (record.isPublic) {
                const cheerSec = card.querySelector('.community-cheer-section');
                cheerSec.style.display = 'flex';
                cheerSec.querySelector('.cheers-count-value').textContent = record.cheersCount || 0;
                cheerSec.querySelector('.btn-cheer').addEventListener('click', () => {
                    updateRecord(record.id, { cheersCount: (record.cheersCount || 0) + 1 });
                    showToast(`您為「${record.taskName}」點亮了守護微光！🕯️`);
                });
            }

            if (record.status === 'done') {
                viewActive.style.display = 'none'; viewReflecting.style.display = 'none'; viewDone.style.display = 'block';
                card.querySelector('.task-title').classList.add('strike');
                card.querySelector('.res-actual-time').textContent = record.reflection.actualTime;
                card.querySelector('.res-post-mood').textContent = record.reflection.postMood;
                
                const msgs = { '輕鬆多了': '✨ 摸摸頭，原來真的沒有想像中那麼可怕！', '充滿能量': '⚡ 實實在在的動力，大腦非常感激你的跨出！', '精疲力盡': '💆 雖然累，但你沒有被困住，請好好放鬆！', '覺得驕傲': '👑 超棒的！今天你展示了對抗焦慮的極致勇氣！' };
                card.querySelector('.congrats-message').textContent = msgs[record.reflection.postMood] || '🎉 溫柔的步伐累積出強大的自己！';
            
            } else if (record.status === 'active' && record.isReflecting) {
                viewActive.style.display = 'none'; viewReflecting.style.display = 'block'; viewDone.style.display = 'none';
                
                card.querySelector('.btn-submit-reflection').addEventListener('click', () => {
                    const actualTime = card.querySelector('.input-actual-time').value.trim();
                    const postMood = card.querySelector('.input-post-mood').value;
                    if (!actualTime || actualTime <= 0) { showToast('請填寫正確的實際耗時（分鐘）唷！'); return; }
                    
                    updateRecord(record.id, { status: 'done', isReflecting: false, reflection: { actualTime: Number(actualTime), postMood } });
                    showToast('🎉 恭喜你完成挑戰！已記錄至歷史成就中。');
                });
            } else {
                viewActive.style.display = 'block'; viewReflecting.style.display = 'none'; viewDone.style.display = 'none';

                const totalSubs = record.subTasks.length;
                const doneSubs = record.subTasks.filter(st => st.isDone).length;
                const isAllSubsDone = totalSubs === 0 || doneSubs === totalSubs;
                const mainTaskCheckbox = card.querySelector('.main-task-checkbox');

                if (isAllSubsDone) {
                    card.querySelector('.main-action').classList.remove('locked');
                    mainTaskCheckbox.disabled = false;
                    card.querySelector('.unlock-msg').style.display = 'none';
                } else {
                    card.querySelector('.main-action').classList.add('locked');
                    mainTaskCheckbox.disabled = true;
                    card.querySelector('.unlock-msg').style.display = 'inline';
                }

                mainTaskCheckbox.addEventListener('change', (e) => { 
                    if (e.target.checked && isAllSubsDone) {
                        updateRecord(record.id, { isReflecting: true });
                        showToast('👏 挑戰主體完成！請到「等待反思」頁面填寫最終心得。');
                    }
                });
            }

            if (record.status === 'active') {
                const totalSubs = record.subTasks.length;
                const doneSubs = record.subTasks.filter(st => st.isDone).length;
                const pct = totalSubs === 0 ? 100 : Math.round((doneSubs / totalSubs) * 100);
                card.querySelector('.task-progress').value = pct;
                card.querySelector('.progress-text').textContent = `${pct}%`;

                const subList = card.querySelector('.sub-tasks-list');
                record.subTasks.forEach(st => {
                    const li = document.createElement('li');
                    li.innerHTML = `<input type="checkbox" id="sub_${record.id}_${st.id}" ${st.isDone ? 'checked' : ''}>
                                    <label for="sub_${record.id}_${st.id}" class="${st.isDone ? 'strike' : ''}">${st.text}</label>`;
                    li.querySelector('input').addEventListener('change', (e) => {
                        const newSubs = record.subTasks.map(sub => sub.id === st.id ? { ...sub, isDone: e.target.checked } : sub);
                        updateRecord(record.id, { subTasks: newSubs });
                    });
                    subList.appendChild(li);
                });
            }
            return card;
        }

        document.getElementById('nav-buttons').addEventListener('click', (e) => {
            const btn = e.target.closest('.nav-btn');
            if (btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentView = btn.getAttribute('data-view');
                if (btn.hasAttribute('data-filter')) currentFilter = btn.getAttribute('data-filter');
                
                document.getElementById('taskSearchInput').value = '';
                
                applyFilterAndRender();
            }
        });

        document.getElementById('taskSearchInput').addEventListener('input', () => {
            applyFilterAndRender();
        });

        document.getElementById('addSubTaskBtn').addEventListener('click', () => {
            const container = document.getElementById('subTasksContainer');
            const input = document.createElement('input');
            input.type = 'text'; input.name = 'subTask';
            input.placeholder = `輕鬆的步驟 ${container.children.length + 1}`;
            container.appendChild(input);
        });

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            if (formData.get('estimatedTime') <= 0) { showToast("時間設定需要大於 0 分鐘唷！"); return; }

            const subTaskInputs = document.querySelectorAll('input[name="subTask"]');
            const subTasks = [];
            subTaskInputs.forEach((input, index) => { if (input.value.trim() !== '') subTasks.push({ id: `sub_${index}`, text: input.value.trim(), isDone: false }); });

            const inputName = formData.get('userName') ? formData.get('userName').trim() : '';
            const newRecord = {
                id: Date.now().toString(), createdAt: new Date().toISOString(), status: 'active', isReflecting: false, 
                taskName: formData.get('taskName'), dreadLevel: formData.get('dreadLevel'), estimatedTime: Number(formData.get('estimatedTime')),
                subTasks: subTasks, reflection: { actualTime: '', postMood: '' }, isPublic: document.getElementById('isPublic').checked, cheersCount: 0,
                userName: inputName === '' ? '匿名同伴' : inputName
            };

            const records = loadData();
            records.push(newRecord);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            syncToSheet({ action: "create", record: newRecord });
            
            e.target.reset();
            document.getElementById('subTasksContainer').innerHTML = `
                <input type="text" name="subTask" placeholder="子任務 1 (例如：打開電腦並登入)" required>
                <input type="text" name="subTask" placeholder="子任務 2 (例如：下載今年的表格)">
            `;
            showToast("✨ 任務成功建立！已為您切換至進行中頁面。");
            
            document.querySelector('[data-filter="active"]').click();
        });

        window.onload = applyFilterAndRender;
    </script>
</body>
</html>
