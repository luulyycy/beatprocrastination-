        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>🚀 戰勝拖延行動清單</h1>
    </header>

    <!-- 導覽列：作為 Filter 切換器 -->
    <nav class="nav-buttons" id="nav-buttons">
        <button class="nav-btn active" data-view="view-create">➕ 新增挑戰</button>
        <button class="nav-btn" data-view="view-list" data-filter="active">🏃 進行中</button>
        <button class="nav-btn" data-view="view-list" data-filter="done">🎉 已完成</button>
        <button class="nav-btn" data-view="view-list" data-filter="all">📋 全部紀錄</button>
    </nav>

    <main style="width: 100%; display: flex; justify-content: center;">
        
        <!-- 表單視圖 -->
        <section id="view-create" class="view-section active">
            <h2 class="section-title">建立新挑戰</h2>
            <div class="task-creation-card">
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskName">任務名稱 (Task Name)：</label>
                        <input type="text" id="taskName" name="taskName" placeholder="例如：完成報稅文件" required>
                    </div>

                    <div class="form-group">
                        <label for="estimatedTime">預估耗時 (Estimated Time)：</label>
                        <div class="time-input-wrapper">
                            <input type="number" id="estimatedTime" name="estimatedTime" placeholder="例如：45" min="1" required>
                            <span class="time-suffix">分鐘</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dreadLevel">焦慮/抗拒程度 (Dread Level)：</label>
                        <select id="dreadLevel" name="dreadLevel" required>
                            <option value="低">低 - 只是有點懶</option>
                            <option value="中">中 - 覺得有些麻煩</option>
                            <option value="高">高 - 想到就覺得壓力很大</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>墊腳石子任務 (Stepping Stones)：</label>
                        <p class="help-text">寫下能幫你開始的最小行動 (全部打勾後才能解鎖完成任務)</p>
                        <div id="subTasksContainer">
                            <input type="text" name="subTask" placeholder="子任務 1 (例如：打開電腦並登入)" required>
                            <input type="text" name="subTask" placeholder="子任務 2 (例如：下載今年的表格)">
                        </div>
                        <button type="button" id="addSubTaskBtn" class="btn-secondary">+ 新增更多墊腳石</button>
                    </div>

                    <button type="submit" class="btn-primary">開始挑戰</button>
                </form>
            </div>
        </section>

        <!-- 列表視圖：單一容器，依照 recordsToShow 動態渲染 -->
        <section id="view-list" class="view-section">
            <h2 class="section-title" id="list-title">任務列表</h2>
            <div class="task-list" id="main-list-container"></div>
        </section>

    </main>

    <!-- 任務卡片的 HTML 模板 -->
    <template id="task-card-template">
        <article class="task-card" data-task-id="">
            <header class="card-header">
                <h3 class="task-title"></h3>
                <div class="task-meta">
                    <span class="badge">⏳ 預估：<span class="value-est-time"></span> 分鐘</span>
                    <span class="badge">😨 焦慮：<span class="value-dread"></span></span>
                </div>
            </header>

            <div class="state-active-view">
                <div class="progress-section">
                    <label>進度：</label>
                    <progress class="task-progress" value="0" max="100"></progress>
                    <span class="progress-text">0%</span>
                </div>
                <div class="sub-tasks-list"></div>
                <div class="main-action">
                    <label>
                        <input type="checkbox" class="main-task-checkbox">
                        <strong>我已完成主任務，準備反思！</strong>
                        <span class="unlock-msg">🔒 需完成所有墊腳石</span>
                    </label>
                </div>
            </div>

            <div class="state-reflecting-view" style="display: none;">
                <h4>🎉 恭喜完成！來做個快速反思：</h4>
                <div class="form-group">
                    <label>實際耗時 (Actual Time)：</label>
                    <div class="time-input-wrapper">
                        <input type="number" class="input-actual-time" placeholder="例如：25" min="1">
                        <span class="time-suffix">分鐘</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>現在的心情 (Post-Action Mood)：</label>
                    <select class="input-post-mood">
                        <option value="輕鬆多了">輕鬆多了 (Relieved)</option>
                        <option value="充滿能量">充滿能量 (Energized)</option>
                        <option value="精疲力盡">精疲力盡 (Drained but Done)</option>
                        <option value="覺得驕傲">覺得驕傲 (Proud)</option>
                    </select>
                </div>
                <button type="button" class="btn-submit-reflection">送出並標記完成 (Done)</button>
            </div>

            <div class="state-done-view" style="display: none;">
                <div class="reflection-results">
                    <p><strong>⏱️ 實際耗時：</strong> <span class="res-actual-time"></span> 分鐘</p>
                    <p><strong>✨ 任務後心情：</strong> <span class="res-post-mood"></span></p>
                </div>
                <div class="congrats-message"></div>
            </div>
        </article>
    </template>

    <script>
        // ==========================================
        // 核心設定與狀態
        // ==========================================
        const STORAGE_KEY = 'records';
        let currentView = 'view-create';
        let currentFilter = 'active';

        // ==========================================
        // Contract Functions (嚴格遵循規範)
        // ==========================================

        /**
         * 1. createRecord(formData): 根據表單建立一筆新 record
         */
        function createRecord(formData) {
            const subTaskInputs = document.querySelectorAll('input[name="subTask"]');
            const subTasks = [];
            
            subTaskInputs.forEach((input, index) => {
                if (input.value.trim() !== '') {
                    subTasks.push({ id: `sub_${index}`, text: input.value.trim(), isDone: false });
                }
            });

            return {
                id: Date.now().toString(),
                createdAt: new Date().toISOString(),
                status: 'active', // 嚴格規定：預設 active
                isReflecting: false, // 自訂欄位：控制 UI 進入反思狀態
                taskName: formData.get('taskName'),
                dreadLevel: formData.get('dreadLevel'),
                estimatedTime: Number(formData.get('estimatedTime')),
                subTasks: subTasks,
                reflection: { actualTime: '', postMood: '' }
            };
        }

        /**
         * 2. saveData(record): 只負責新增到 records array 並寫入 localStorage
         */
        function saveData(record) {
            const records = loadData();
            records.push(record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }

        /**
         * 3. loadData(): 從 localStorage 讀取，沒有就回傳 []
         * 包含自動遷移 (Migration)，將舊版本的狀態改為標準 active / done，修復畫面空白問題
         */
        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (!data) return [];
            
            let records = JSON.parse(data);
            let migrated = false;
            
            // 遷移舊資料的狀態
            records.forEach(r => {
                if (r.status === 'started') { r.status = 'active'; migrated = true; }
                if (r.status === 'reflecting') { r.status = 'active'; r.isReflecting = true; migrated = true; }
                if (r.status === 'completed') { r.status = 'done'; migrated = true; }
            });

            if (migrated) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            }
            return records;
        }

        /**
         * 4. updateRecord(id, changes): 更新一筆 record 並寫入 localStorage
         */
        function updateRecord(id, changes) {
            let records = loadData();
            records = records.map(record => record.id === id ? { ...record, ...changes } : record);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            applyFilterAndRender(); // 觸發畫面即時更新
        }

        /**
         * 5. renderList(recordsToShow): 把傳入的 records 顯示到頁面
         */
        function renderList(recordsToShow) {
            const listContainer = document.getElementById('main-list-container');
            listContainer.innerHTML = ''; // 清空現有清單

            if (recordsToShow.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">目前沒有符合的挑戰紀錄。</div>';
                return;
            }

            recordsToShow.forEach(record => {
                listContainer.appendChild(createCardDOM(record));
            });
        }

        // ==========================================
        // UI 控制與過濾器 Orchestrator
        // ==========================================
        function applyFilterAndRender() {
            // 切換視圖 CSS
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(currentView).classList.add('active');

            if (currentView === 'view-create') return;

            // 實作 Active / Done Filter
            const allRecords = loadData();
            let recordsToShow = [];
            const listTitle = document.getElementById('list-title');

            if (currentFilter === 'active') {
                recordsToShow = allRecords.filter(r => r.status === 'active');
                listTitle.textContent = '🏃 進行中任務 (Active)';
            } else if (currentFilter === 'done') {
                recordsToShow = allRecords.filter(r => r.status === 'done');
                listTitle.textContent = '🎉 已克服任務 (Done)';
            } else {
                recordsToShow = allRecords;
                listTitle.textContent = '📋 全部紀錄 (All)';
            }

            // 呼叫規定好的 renderList
            renderList(recordsToShow);
        }

        // ==========================================
        // 卡片 DOM 生成邏輯
        // ==========================================
        function generateCongratsMsg(mood) {
            const msgs = {
                '輕鬆多了': '太棒了！擔憂總是比實際行動可怕。',
                '充滿能量': '完美！這就是行動帶來的正向循環！',
                '精疲力盡': '辛苦了，你撐過來了！現在好好休息吧。',
                '覺得驕傲': '你絕對值得為自己感到驕傲，繼續保持！'
            };
            return msgs[mood] || '恭喜戰勝拖延！';
        }

        function createCardDOM(record) {
            const template = document.getElementById('task-card-template');
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.task-card');
            
            card.dataset.taskId = record.id;
            card.classList.add(`status-${record.status}`);
            
            const titleEl = card.querySelector('.task-title');
            titleEl.textContent = record.taskName;
            card.querySelector('.value-est-time').textContent = record.estimatedTime;
            card.querySelector('.value-dread').textContent = record.dreadLevel;

            const viewActive = card.querySelector('.state-active-view');
            const viewReflecting = card.querySelector('.state-reflecting-view');
            const viewDone = card.querySelector('.state-done-view');

            // --- 狀態切換呈現 (依照合約 status 只能是 active/done) ---
            if (record.status === 'done') {
                // Done 狀態
                viewActive.style.display = 'none';
                viewReflecting.style.display = 'none';
                viewDone.style.display = 'block';
                titleEl.classList.add('strike');

                card.querySelector('.res-actual-time').textContent = record.reflection.actualTime;
                card.querySelector('.res-post-mood').textContent = record.reflection.postMood;
                card.querySelector('.congrats-message').textContent = generateCongratsMsg(record.reflection.postMood);
                
            } else if (record.status === 'active' && record.isReflecting) {
                // Active + 反思UI 狀態
                viewActive.style.display = 'block';
                viewReflecting.style.display = 'block';
                viewDone.style.display = 'none';
                card.querySelector('.main-action').style.display = 'none';

                const submitBtn = card.querySelector('.btn-submit-reflection');
                submitBtn.addEventListener('click', () => {
                    const actualTime = card.querySelector('.input-actual-time').value.trim();
                    const postMood = card.querySelector('.input-post-mood').value;
                    
                    if (!actualTime || actualTime <= 0) { alert('請填寫正確的實際耗時 (分鐘)！'); return; }
                    
                    // 正式切換為 Done
                    updateRecord(record.id, {
                        status: 'done',
                        isReflecting: false,
                        reflection: { actualTime: Number(actualTime), postMood }
                    });
                });
            } else {
                // 純粹的 Active 狀態
                viewActive.style.display = 'block';
                viewReflecting.style.display = 'none';
                viewDone.style.display = 'none';

                const totalSubs = record.subTasks.length;
                const doneSubs = record.subTasks.filter(st => st.isDone).length;
                const isAllSubsDone = totalSubs === 0 || doneSubs === totalSubs;

                const mainActionDiv = card.querySelector('.main-action');
                const mainTaskCheckbox = card.querySelector('.main-task-checkbox');
                const unlockMsg = card.querySelector('.unlock-msg');

                if (isAllSubsDone) {
                    mainActionDiv.classList.remove('locked');
                    mainTaskCheckbox.disabled = false;
                    unlockMsg.style.display = 'none';
                } else {
                    mainActionDiv.classList.add('locked');
                    mainTaskCheckbox.disabled = true;
                    unlockMsg.style.display = 'inline';
                }

                mainTaskCheckbox.addEventListener('change', (e) => {
                    if (e.target.checked && isAllSubsDone) {
                        updateRecord(record.id, { isReflecting: true });
                    }
                });
            }

            // 繪製子任務進度
            if (record.status === 'active') {
                const totalSubs = record.subTasks.length;
                const doneSubs = record.subTasks.filter(st => st.isDone).length;
                const progressPct = totalSubs === 0 ? 100 : Math.round((doneSubs / totalSubs) * 100);

                card.querySelector('.task-progress').value = progressPct;
                card.querySelector('.progress-text').textContent = `${progressPct}%`;

                const subListContainer = card.querySelector('.sub-tasks-list');
                record.subTasks.forEach(st => {
                    const li = document.createElement('li');
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = st.isDone;
                    checkbox.id = `sub_${record.id}_${st.id}`;
                    
                    const label = document.createElement('label');
                    label.htmlFor = checkbox.id;
                    label.textContent = st.text;
                    if (st.isDone) label.classList.add('strike');

                    checkbox.addEventListener('change', (e) => {
                        const updatedSubTasks = record.subTasks.map(sub => 
                            sub.id === st.id ? { ...sub, isDone: e.target.checked } : sub
                        );
                        updateRecord(record.id, { subTasks: updatedSubTasks });
                    });

                    li.appendChild(checkbox);
                    li.appendChild(label);
                    subListContainer.appendChild(li);
                });
            }

            return card;
        }

        // ==========================================
        // 事件綁定 (Events)
        // ==========================================
        
        // 導覽列點擊切換 - 修正點擊判定誤差 (.closest)
        document.getElementById('nav-buttons').addEventListener('click', (e) => {
            const btn = e.target.closest('.nav-btn');
            if (btn) {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentView = btn.getAttribute('data-view');
                if(btn.hasAttribute('data-filter')) {
                    currentFilter = btn.getAttribute('data-filter');
                }
                
                applyFilterAndRender();
            }
        });

        // 新增子任務欄位
        document.getElementById('addSubTaskBtn').addEventListener('click', () => {
            const container = document.getElementById('subTasksContainer');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'subTask';
            input.placeholder = `子任務 ${container.children.length + 1}`;
            container.appendChild(input);
        });

        // 提交表單
        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            if (formData.get('estimatedTime') <= 0) {
                alert("預估時間必須大於 0 分鐘！");
                return;
            }

            const newRecord = createRecord(formData);
            saveData(newRecord); 
            
            e.target.reset();
            document.getElementById('subTasksContainer').innerHTML = `
                <input type="text" name="subTask" placeholder="子任務 1 (例如：打開電腦並登入)" required>
                <input type="text" name="subTask" placeholder="子任務 2 (例如：下載今年的表格)">
            `;
            
            // 自動切換到進行中列表
            const runningBtn = document.querySelector('[data-filter="active"]');
            if(runningBtn) runningBtn.click();
        });

        // 初始載入
        window.onload = applyFilterAndRender;

    </script>
</body>
</html>
